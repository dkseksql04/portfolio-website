                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                    </svg>
                                </button>

                                {/* Top Area: Text Content */}
                                <div className="p-8 md:p-12 bg-slate-900 flex flex-col justify-center items-center text-center">
                                    <h3 className={`text-2xl md:text-4xl font-black mb-4 ${selectedSkill.theme.text}`}>{selectedSkill.modalContent.topTitle}</h3>
                                    <p className="text-slate-300 md:text-lg font-medium mb-8 max-w-2xl">{selectedSkill.modalContent.details}</p>
                                    <div className="bg-slate-800/50 border border-slate-700 rounded-lg p-5 md:p-6 max-w-3xl">
                                        <p className={`text-lg md:text-xl font-bold leading-relaxed ${selectedSkill.theme.text.replace('text-brand-', 'text-brand-')}`}>{selectedSkill.modalContent.appeal}</p>
                                    </div>
                                </div>

                                {/* Bottom Area: Image Container */}
                                <div className="w-full bg-slate-950 p-6 md:p-10 flex items-center justify-center border-t border-slate-800">
                                    <div className="relative w-full max-w-2xl rounded-xl overflow-hidden shadow-lg border border-slate-800/80">
                                        <img
                                            src="https://via.placeholder.com/500x350"
                                            alt={selectedSkill.modalContent.topTitle}
                                            className="w-full h-auto object-cover transform hover:scale-105 transition-transform duration-700"
                                        />
                                        <div className="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent mix-blend-overlay pointer-events-none"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </section>
            );
        };

        // 7. Footer
        const Footer = () => {
            return (
                <footer className="bg-transparent border-t border-slate-800 py-10 md:py-12 transition-colors">
                    <div className="max-w-6xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">
                        <div className="text-xl md:text-2xl font-bold text-slate-600">
                            Portfolio.
                        </div>
                        <div className="flex gap-6">
                            <a href="#" className="text-slate-400 hover:text-brand-primary transition-colors text-sm md:text-base font-medium">GitHub</a>
                            <a href="#" className="text-slate-400 hover:text-brand-primary transition-colors text-sm md:text-base font-medium">LinkedIn</a>
                            <a href="#" className="text-slate-400 hover:text-brand-primary transition-colors text-sm md:text-base font-medium">Blog</a>
                        </div>
                        <div className="text-slate-500 text-xs md:text-sm">
                            © {new Date().getFullYear()} 안단비. All rights reserved.
                        </div>
                    </div>
                </footer>
            );
        };

        // MAIN APP COMPONENT
        const App = () => {
            // Dark mode state is kept for potential future logic, but we enforce true globally now
            const [darkMode, setDarkMode] = useState(true);

            useEffect(() => {
                // Enforce dark mode class on body unconditionally
                document.documentElement.classList.add('dark');
                document.body.classList.add('dark');
                document.body.style.backgroundColor = '#0f172a'; // Force Navy via inline style

                // Setup IntersectionObserver for scroll animations
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('is-visible');
                        }
                    });
                }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

                setTimeout(() => {
                    document.querySelectorAll('.fade-in-section').forEach(el => observer.observe(el));
                }, 100);

                return () => observer.disconnect();
            }, []);

            return (
                <div className="flex flex-col min-h-screen bg-brand-dark text-slate-300 w-full">
                    <Header darkMode={darkMode} setDarkMode={setDarkMode} />
                    <main className="flex-1 w-full overflow-x-hidden">
                        <Hero />
                        <Experience />
                        <Timeline />
                        <MajorActivities />
                        <SoftSkills />
                    </main>
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
